<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SoloQuest — Thông Tin Cơ Bản</title>
<link rel="stylesheet" href="../soloquest-tokens.css">
<link rel="stylesheet" href="../onboarding-steps.css">
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span class="status-bar__time">09:41</span>
      <div class="status-bar__icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="1" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12" fill="currentColor"><rect x="0" y="1" width="20" height="10" rx="2" stroke="currentColor" stroke-width="1" fill="none"/><rect x="21" y="4" width="2" height="4" rx="1"/><rect x="2" y="3" width="14" height="6" rx="1"/></svg>
      </div>
    </div>

    <div class="page-full">
      <div class="onboard-container">
        <div class="onboard-header">
          <div class="onboard-step">Bước 2 / 9 — Thông Tin Cơ Bản</div>
          <h1 class="onboard-title">Thông Tin Cá Nhân</h1>
          <p class="onboard-desc">Hệ thống cần dữ liệu cơ bản để tính toán nhiệm vụ phù hợp</p>
        </div>

        <div class="step-progress">
          <div class="step-bar active"></div>
          <div class="step-bar"></div>
          <div class="step-bar"></div>
          <div class="step-bar"></div>
          <div class="step-bar"></div>
          <div class="step-bar"></div>
          <div class="step-bar"></div>
          <div class="step-bar"></div>
          <div class="step-bar"></div>
        </div>

        <div class="form-section">
          <div class="form-group">
            <label class="form-label">Tên Hiển Thị</label>
            <input type="text" class="form-input" placeholder="Nhập tên của bạn" value="Minh">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Tuổi</label>
              <div class="input-suffix">
                <input type="number" class="form-input" placeholder="25" value="24">
                <span class="suffix">tuổi</span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Giới Tính</label>
              <select class="form-input form-select">
                <option selected>Nam</option>
                <option>Nữ</option>
                <option>Khác</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Chiều Cao</label>
              <div class="input-suffix">
                <input type="number" class="form-input" placeholder="170" value="175">
                <span class="suffix">cm</span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Cân Nặng</label>
              <div class="input-suffix">
                <input type="number" class="form-input" placeholder="70" value="68">
                <span class="suffix">kg</span>
              </div>
            </div>
          </div>

          <p class="system-hint">[ HỆ THỐNG ] Dữ liệu hồ sơ được mã hóa. Chỉ dùng để tối ưu hóa nhiệm vụ.</p>
        </div>

        <div class="onboard-actions">
          <a href="step-01-welcome.html" class="btn btn--secondary">← Quay lại</a>
          <a href="step-03-work.html" class="btn btn--primary">Tiếp theo →</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
